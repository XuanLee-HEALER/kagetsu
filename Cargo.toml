[package]
name = "tui-majo"
version = "0.1.0"
edition = "2024"
description = "Riichi Mahjong (日本麻将) in your terminal, written in Rust + ratatui"
license = "GPL-3.0-or-later"
repository = "https://github.com/XuanLee-HEALER/tui-majo"
homepage = "https://github.com/XuanLee-HEALER/tui-majo"
readme = "README.md"
keywords = ["mahjong", "riichi", "tui", "ratatui", "japanese"]
categories = ["games", "command-line-utilities"]
default-run = "tui-majo"
exclude = [
    ".design-package/",
    "docs/scratch.md",
    "docs/img/",
    "*.png",
]

[dependencies]
ratatui = "0.30"
crossterm = "0.28"
anyhow = "1"
thiserror = "2"
rand = "0.9"
rand_chacha = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
unicode-width = "0.2"
# 多人对战 (LAN) 相关.
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync", "net", "io-util"] }
axum = { version = "0.8", features = ["ws"] }
tokio-tungstenite = "0.27"
futures-util = "0.3"
mdns-sd = "0.13"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
pretty_assertions = "1"
proptest = "1"

[[bin]]
name = "tui-majo"
path = "src/main.rs"

[[bin]]
name = "tui-majo-game"
path = "src/bin/game.rs"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
