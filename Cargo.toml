[package]
name = "tui-majo"
version = "0.1.0"
edition = "2024"
description = "Riichi Mahjong (日本麻将) in your terminal, written in Rust + ratatui"
license = "MIT"
default-run = "tui-majo"

[dependencies]
ratatui = "0.30"
crossterm = "0.28"
anyhow = "1"
thiserror = "2"
rand = "0.9"
rand_chacha = "0.9"
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
pretty_assertions = "1"

[[bin]]
name = "tui-majo"
path = "src/main.rs"

[[bin]]
name = "tui-majo-game"
path = "src/bin/game.rs"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
