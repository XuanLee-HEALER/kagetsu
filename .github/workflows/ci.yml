name: CI

# 聚焦 kagetsu-core: fmt + clippy + 单元测试 + 覆盖率。
# 测试只跑 --lib (403 单元测试), 对齐 justfile 的 `just ci` 惯例 ——
# tests/ 下的 4-swarm libp2p 集成与 proptest fuzz 偏重 / 偶发 flaky,
# 不进 CI, 由 `just fuzz` 等本地配方按需跑。

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (kagetsu-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p kagetsu-core -- --check

      - name: Clippy
        run: cargo clippy -p kagetsu-core --all-targets --features dev-tools -- -D warnings

      - name: Test (lib)
        # --test-threads=1: mp actor e2e 是重加密测试, 并行下会被 CPU 争抢
        # 饿死 (cargo 并行 × 每测试 worker_threads=4 runtime)。串行让每个
        # 测试独占 runner CPU, 才能在 run_bridge 的步数预算内跑完。
        run: cargo test -p kagetsu-core --lib --features dev-tools -- --test-threads=1

  coverage:
    name: coverage (kagetsu-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (lcov)
        # 同 test job: --test-threads=1 避免 mp e2e 测试被 CPU 争抢饿死。
        run: cargo llvm-cov -p kagetsu-core --lib --features dev-tools --ignore-run-fail --lcov --output-path lcov.info -- --test-threads=1

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: kagetsu-core
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
